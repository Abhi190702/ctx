services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./dev.db"
      CTX_API_URL: "http://localhost:3000/api"
      CTX_APP_URL: "http://localhost:3000"
    volumes:
      - ctx-data:/app/apps/web/prisma

  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    environment:
      CTX_API_URL: "http://web:3000/api"
    depends_on:
      - web

volumes:
  ctx-data:
